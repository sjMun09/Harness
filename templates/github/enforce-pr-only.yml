# Layer 3 of the Harness branch-protection stack.
#
# ALARM ONLY — detects when a commit lands on main/dev/qa without an
# associated merged PR and fails the workflow + opens a policy-violation
# issue. Does NOT auto-revert (intentionally; auto-rewriting history on
# protected branches is more dangerous than the problem it solves for a
# solo operator).
#
# Visibility gate: by default this workflow runs ONLY when the repo is PUBLIC.
# Rationale: on GitHub Free, private repos share a 2 000 min/month Actions
# quota, and classic Branch Protection + the Rulesets API are both 403-gated
# for private+Free — so Actions is the only server-side enforcement option,
# but we don't want to burn the quota just to police branch pushes that
# Layers 1 + 2 (local pre-push hook + Harness PreToolUse guard) already
# catch. The gate `repository.private == false` means: private repos skip
# instantly (0 minutes), and if a repo is ever flipped to public the alarm
# auto-activates without any additional wiring. If your org is NOT on Free
# (Pro / Team / Enterprise — minutes are included or generous), or you
# simply want the alarm on private repos too, delete the `if:` line below.
#
# Drop this file at `.github/workflows/enforce-pr-only.yml` in any repo
# you want gated.
#
# Upgrade path: when your org moves to GitHub Team / Enterprise, replace
# this alarm with a proper Branch Protection or Ruleset via
# `gh api -X PUT repos/<ORG>/<repo>/branches/<branch>/protection` — see
# templates/settings/README.md §"Upgrade path".
name: enforce-pr-only

on:
  push:
    branches: [main, dev, qa]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  verify-merged-via-pr:
    # Only fire on PUBLIC repos. Private repos skip instantly so the
    # workflow is a no-op against private-Free billing.
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check that the head commit landed via a merged PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          sha="${{ github.event.after }}"
          branch="${{ github.ref_name }}"
          actor="${{ github.actor }}"

          # GitHub's `/commits/{sha}/pulls` endpoint is eventually-consistent:
          # the workflow can fire 5-15s after a merge, before the merge→PR
          # association is indexed, producing false-positive alarms. Retry
          # with backoff (total ~100s) before concluding it's a real direct
          # push. If it's a true direct push, there was never a PR and no
          # amount of waiting will make one appear — the only cost is a
          # 100s delay on the alarm, which is fine for an alarm-only layer.
          pr_count=0
          for attempt in 1 2 3 4 5; do
            pr_count=$(gh api "repos/${{ github.repository }}/commits/$sha/pulls" \
              --jq "[.[] | select(.merged_at != null and .base.ref == \"$branch\")] | length")
            if [ "$pr_count" != "0" ]; then
              echo "ok — sha $sha landed via merged PR (attempt $attempt)."
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              delay=$((attempt * 10))
              echo "attempt $attempt: no merged PR associated yet, retrying in ${delay}s (GitHub API indexing lag)..."
              sleep "$delay"
            fi
          done

          # All 5 attempts exhausted — treat as a real policy violation.
          echo "::error title=Policy violation::Direct push to '$branch' by $actor (sha=$sha) — no merged PR associated after 5 retries."

          gh issue create \
            --title "Policy violation: direct push to $branch" \
            --body "**Actor**: $actor
          **Branch**: $branch
          **SHA**: $sha
          **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          This commit landed on a protected branch without a merged pull request. Policy requires all changes to protected branches to go through PR + review.

          If this was intentional (emergency hotfix, force-push recovery, etc.), close this issue with a short explanation. Otherwise consider reverting via \`gh pr create\` and merging the revert through the normal flow." \
            || echo "::warning::could not open issue (token scope?)"

          exit 1
