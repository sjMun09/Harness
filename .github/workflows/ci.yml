name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  size-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --bin harness
      - name: Binary size <= 45 MiB
        run: |
          size=$(stat -c%s target/release/harness)
          echo "harness binary size: $size bytes ($((size/1024/1024)) MiB)"
          limit=$((45 * 1024 * 1024))
          if [ "$size" -gt "$limit" ]; then
            echo "::error::binary $size > $limit (45 MiB)"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: harness-linux-x64
          path: target/release/harness
