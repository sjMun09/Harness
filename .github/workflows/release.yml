name: release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build harness (release, default features)
        shell: bash
        run: cargo build --release --locked --bin harness -p harness-cli --target ${{ matrix.target }}

      - name: Package tarball
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          target="${{ matrix.target }}"
          stage="harness-v${version}-${target}"
          mkdir -p "dist/${stage}"
          cp "target/${target}/release/harness" "dist/${stage}/harness"
          chmod +x "dist/${stage}/harness"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          if [ "$RUNNER_OS" = "macOS" ]; then
            shasum -a 256 "dist/${stage}.tar.gz" | awk '{print $1"  "$2}' | sed "s|dist/||" > "dist/${stage}.tar.gz.sha256"
          else
            sha256sum "dist/${stage}.tar.gz" | awk '{print $1"  "$2}' | sed "s|dist/||" > "dist/${stage}.tar.gz.sha256"
          fi
          echo "stage=${stage}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.stage }}
          path: |
            dist/${{ steps.pkg.outputs.stage }}.tar.gz
            dist/${{ steps.pkg.outputs.stage }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect tarballs and build SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -name 'harness-*.tar.gz' -exec cp {} release/ \;
          cd release
          ls -la
          sha256sum harness-*.tar.gz | sort -k 2 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/harness-*.tar.gz
            release/SHA256SUMS.txt
          fail_on_unmatched_files: true
          append_body: false
